<!--გღეს ნასწავლ block ელემენტებში შედის h1 დან h6დე, ul, ol, li, p. ხოლო inline ბში შედის button, b, i, u, strong, em, input, label.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="border: 1px dotted red;">Hi!</h1>
    <button style="border: 1px dotted red;">Hi!</button>
    <!--ეს მოხდა რადგან h1 დან h6 დე ყველა არის block ელემენტი, ხოლო button არის inline.-->
    
    
    <ol style="background-color: aqua; border: 1px double black; color: red;">
         <li>Hello!</li>
         <li>Hi!</li>
    </ol>
    <!--ეს ხდება რადგან ლისტები არიან block ელემენტები.-->
</body>
</html>
