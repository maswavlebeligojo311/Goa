<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 p{
            color: red;
        }
        div p{
            text-align: center;
            color: blue;
        }
        div{
            background-color: black;
            border: 1px dotted white;
        }
    </style>
</head>
<body>
    <!--descendant selector არის იგივე რაც ჩანესტვა-->
    <p><b>sasdas</b></p>
    <h1><b>asdsadsad</b></h1>
    <h2><b>dfdsfsd</b></h2>
    <!--style inheritance არის შვილი თეგი, მშობელ თეგში ჩაშენებული.-->

    <div>
        <p>something</p>
        <p>something2</p>
        <p>something3</p>
        <p>something4</p>
        <p>something5</p>
        <p>idk</p>
        <p>idk2</p>
        <p>idk3</p>
        <p>idk4</p>
        <p>idk5</p>
    </div>
</body>
</html>
